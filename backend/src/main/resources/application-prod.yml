# 生产环境配置
spring:
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://localhost:3306/tricenter?useUnicode=true&characterEncoding=utf-8&useSSL=false&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true
    username: ${DB_USER:root}
    password: ${DB_PASSWORD:}
    hikari:
      minimum-idle: 5
      maximum-pool-size: 20
      idle-timeout: 30000
      connection-timeout: 30000
      max-lifetime: 1800000

  data:
    redis:
      host: localhost
      port: 6379
      password: ${REDIS_PASSWORD:}
      database: 1
      timeout: 10000ms

# JWT配置
jwt:
  secret: ${JWT_SECRET:tricenter-enterprise-management-system-jwt-secret-key-2026-very-long-secret-key-for-hs512-algorithm-minimum-512-bits}
  expiration: 604800000

# 系统间API Key认证
tricenter:
  api-key: ${TRICENTER_API_KEY:booking-to-tricenter-secret-key}

# 日志配置
logging:
  level:
    com.tricenter: info
    org.springframework.security: warn
    org.apache.ibatis: warn
    org.mybatis: warn
    org.mybatis.spring: warn
    org.springframework.web.servlet.handler.HandlerMappingIntrospector: error
