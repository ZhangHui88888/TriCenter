# TriCenter 前端 Nginx 配置
# 部署路径：/etc/nginx/conf.d/czcrop.top.conf

# HTTP → HTTPS 重定向
server {
    listen 80;
    server_name czcrop.top www.czcrop.top;
    return 301 https://czcrop.top$request_uri;
}

# www → 主域名重定向
server {
    listen 443 ssl http2;
    server_name www.czcrop.top;

    ssl_certificate     /etc/letsencrypt/live/czcrop.top/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/czcrop.top/privkey.pem;

    return 301 https://czcrop.top$request_uri;
}

server {
    listen 443 ssl http2;
    server_name czcrop.top;

    # SSL 证书（使用 Let's Encrypt 通配符证书或单独申请）
    ssl_certificate     /etc/letsencrypt/live/czcrop.top/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/czcrop.top/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;

    # 前端静态资源根目录
    root /opt/tricenter/frontend-dist;
    index index.html;

    # React Router history 模式支持
    location / {
        try_files $uri $uri/ /index.html;
    }

    # 静态资源缓存
    location /assets/ {
        expires 30d;
        add_header Cache-Control "public, immutable";
    }

    # 禁止访问隐藏文件
    location ~ /\. {
        deny all;
    }

    access_log /var/log/nginx/czcrop.top.access.log;
    error_log  /var/log/nginx/czcrop.top.error.log;
}
