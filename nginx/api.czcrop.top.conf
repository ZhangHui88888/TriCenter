# TriCenter API 服务 Nginx 配置
# 部署路径：/etc/nginx/conf.d/api.czcrop.top.conf

# HTTP → HTTPS 重定向
server {
    listen 80;
    server_name api.czcrop.top;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    server_name api.czcrop.top;

    # SSL 证书
    ssl_certificate     /etc/letsencrypt/live/czcrop.top/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/czcrop.top/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;

    # 请求体大小限制（文件上传）
    client_max_body_size 20m;

    # 反向代理到 Spring Boot（端口 8081）
    location / {
        proxy_pass http://127.0.0.1:8081;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }

    access_log /var/log/nginx/api.czcrop.top.access.log;
    error_log  /var/log/nginx/api.czcrop.top.error.log;
}
